<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Troca de Imagens com JavaScript</title>
        <style>
            body {
                text-align: center;
                margin-top: 50px;
                font-family: 'Times New Roman', Times, serif;
            }
            img {
                width: 300px;
                border: 2px solid #ccc;
                border-radius: 10px;
            }
            button {
                margin-top: 20px;
                padding: 10px 20px;
                font-size: 16px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <h1>Imagens Dinamicas</h1>
        <div>
            <img id="minhaImagem" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8DbLye0-ZSWMUS6NiKkWHqEBsHKJwZ--iOQ&s" alt="Imagem 1"><br>
        </div>
        <div>
            <button id="imagem1">Imagem 1</button>
            <button id="imagem2">Imagem 2</button>
            <button id="imagem3">Imagem 3</button>
            <script>
                const imagem = document.getElementById("minhaImagem");


                const botao1 = document.getElementById("imagem1");
                const botao2 = document.getElementById("imagem2");
                const botao3 = document.getElementById("imagem3");


                botao1.addEventListener("click", function() {
                    imagem.src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8DbLye0-ZSWMUS6NiKkWHqEBsHKJwZ--iOQ&s";
                });
                botao2.addEventListener("click", function() {
                    imagem.src = "https://ovicio.com.br/wp-content/uploads/2024/01/20240108-maki2.png";
                });
                botao3.addEventListener("click", function() {
                    imagem.src = "https://i.pinimg.com/736x/04/56/36/0456369a471c30ddd24e5b96f70d82a7.jpg";
                });
            </script>
        </div>
    </body>
</html>
