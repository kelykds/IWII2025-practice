<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content "width=devicewidth, initial-scale=1.0">
        <title>JavaScript Básico: Estrutura Básica</title> <!-- Existem duas formas de colocar o JavaScript na página:-->
        <script>
            console.log("Olá Mundo."); 
        </script> <!-- 1: Dentro de uma tag script -->

        <h1>Primeira estrutura básica</h1>
        <p>2: Dentro de um arquivo script.js e depois referenciar no html</p>

        <h2>Variáveis e Tipos de Dados</h2>
        <p>Declarar variável: <i>var variavel = valor;</i></p>
        <div>Case Sensitive</div>
    </body>
    
</html>
