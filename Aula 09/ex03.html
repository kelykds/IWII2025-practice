<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 06</title>
    <script>
        hoje = new Date()
        document.write("Data e hora completa: " + hoje);
        document.write("<br>Dia: " + hoje.getDate());
        document.write("<br>Dia da semana: " + hoje.getDay());
        document.write("<br>Mês: " + (hoje.getMonth() + 1));
        document.write("<br>Ano: " + hoje.getFullYear());
        document.write("<br>Hora: " + hoje.getHours());
        document.write("<br>Minutos: " + hoje.getMinutes());
        document.write("<br>Segundos: " + hoje.getSeconds());
    </script>
</head>
<body>
    <h1>Hoje!</h1>
</body>
</html>
