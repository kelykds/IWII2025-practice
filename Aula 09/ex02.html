<!DOCTYPE html>
<html lang="pt-br">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 05</title>
    <script>
        var phrase = window.prompt("Digite uma frase:");
        document.write(phrase + "<br>");
        size = phrase.length;
        for (var i = 0; i < size; i++) {
            document.write("<br>Caractere na posição " + i +" : " + phrase.charAt(i));
        }

        document.write("<br><br>Primeiro caractere: " + phrase.charAt(0) + "<br>");
        document.write("Ultimo caractere: " + phrase.charAt(phrase.length-1) + "<br><br>");

        var frase = "Olá, tudo bem?";
        document.write(frase + "<br>");
        tamanho = frase.length;
        for (var i = 0; i < tamanho; i++) {
            document.write("<br>Caractere na posição " + i +" : " + frase.charAt(i));
        }

        document.write("<br><br>Primeiro caractere: " + frase.charAt(0) + "<br>");
        document.write("Ultimo caractere: " + frase.charAt(frase.length-1));
    </script>
</html>
