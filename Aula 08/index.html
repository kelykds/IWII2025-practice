<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculadora</title>
        <style>
            body {
                text-align: center;
                margin-top: 50px;
                font-family: 'Times New Roman', Times, serif;
            }
            img {
                width: 300px;
                border: 2px solid #ccc;
                border-radius: 10px;
            }
            button {
                margin-top: 20px;
                padding: 10px 20px;
                font-size: 16px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <h1>Calculadora</h1>
        <h2>Vamos calcular?</h2>
        <input type="number" name="" id="num1" placeholder="Digite um Número">
        <input type="number" name="" id="num2" placeholder="Digite outro Número">
        <br>
        <button id="btn_soma" onclick="somar()">Somar</button>
        <button id="btn_subtracao" onclick="subtrair()">Subtração</button>
        <button id="btn_multiplicacao" onclick="multiplicar()">Multiplicação</button>
        <button id="btn_divisao" onclick="dividir()">Divisão</button>
        <br>
        <button id="btn_limpar" onclick="limpar()">Limpar</button>
        <hr>
        <p>O resultado é: <span id="resultado"></span></p>

        <script>
            var numero1 = document.getElementById("num1");
            var numero2 = document.getElementById("num2");
            var resultado = document.getElementById("resultado");

            function somar() {
                var n1 = parseInt(numero1.value);
                var n2 = parseInt(numero2.value);
                var soma = n1 + n2;
                resultado.innerHTML = soma;
            }
            function subtrair() {
                var n1 = parseInt(numero1.value);
                var n2 = parseInt(numero2.value);
                var diferenca = n1 - n2;
                resultado.innerHTML = diferenca;
            }
            function multiplicar() {
                var n1 = parseInt(numero1.value);
                var n2 = parseInt(numero2.value);
                let produto = n1 * n2;
                resultado.innerHTML = produto;
            }
            function dividir() {
                var n1 = parseInt(numero1.value);
                var n2 = parseInt(numero2.value);
                if (n2 == 0) {
                    resultado.innerHTML = "<b style='color:red'>Não é possível dividir por zero</b>";
                } 
                else {
                    let quociente = n1 / n2;
                    resultado.innerHTML = quociente;
                }
            }
            function limpar() {
                numero1.value = "";
                numero2.value = "";
                resultado.innerHTML = "";
            }
        </script>
    </body>
</html>
